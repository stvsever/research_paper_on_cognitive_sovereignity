services:
  cognitive-sovereignty-sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-mistralai/mistral-small-3.2-24b-instruct}"
      OUTPUT_ROOT: "${OUTPUT_ROOT:-evaluation/run_new}"
      RUN_ID: "${RUN_ID:-run_new}"
      N_PROFILES: "${N_PROFILES:-80}"
      PIPELINE_SEED: "${PIPELINE_SEED:-99}"
      ATTACK_RATIO: "${ATTACK_RATIO:-1.0}"
      ATTACK_LEAVES: "${ATTACK_LEAVES:-Misleading_Narrative_Framing,Fear_Appeal_Scapegoating_Post,Astroturf_Comment_Wave,Pseudo_Expert_Authority_Cue,LLM_Chatbot_Personalized_Persuasion,Deepfake_Audio_Speech_Impersonation}"
      MAX_OPINION_LEAVES: "${MAX_OPINION_LEAVES:-8}"
      TEMPERATURE: "${TEMPERATURE:-0.15}"
      MAX_REPAIR_ITER: "${MAX_REPAIR_ITER:-2}"
      BOOTSTRAP_SAMPLES: "${BOOTSTRAP_SAMPLES:-600}"
      REPORT_ROOT: "${REPORT_ROOT:-research_report/report}"
      REPORT_ASSETS_ROOT: "${REPORT_ASSETS_ROOT:-research_report/assets}"
      PAPER_TITLE: "${PAPER_TITLE:-Inter-individual Differences in Susceptibility to Cyber-manipulation: A Multi-agent Simulation Approach with High-dimensional State Space of Political Opinions}"
      RUN_STAGE_CHECKS: "${RUN_STAGE_CHECKS:-true}"
      # Custom ontology paths (optional — overrides built-in test ontologies)
      PROFILE_ONTOLOGY_PATH: "${PROFILE_ONTOLOGY_PATH:-}"
      ATTACK_ONTOLOGY_PATH: "${ATTACK_ONTOLOGY_PATH:-}"
      OPINION_ONTOLOGY_PATH: "${OPINION_ONTOLOGY_PATH:-}"
    volumes:
      - ../evaluation:/app/evaluation
      - ../research_report:/app/research_report
